# base Resources\Prototypes\_Mono\NPCs\Shuttle\shuttle.yml

# LuaTech
- type: utilityQuery
  id: NearbyShuttleTargetsLuaTech
  query:
  - !type:NearbyNonFactionShuttlesQuery
    blacklist:
      tags:
      - ShuttleAIIgnore
    excludedCompanies:
    - LuaTech
  considerations:
  - !type:TargetInverseDistanceCon
    curve: !type:QuadraticCurve
      slope: 1
      exponent: 1
      yOffset: 0
      xOffset: 0

- type: htnCompound
  id: AttackerShuttleCompoundLuaTech
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargetsLuaTech
    - !type:HTNCompoundTask
      task: ShuttleAttackCompound

- type: htnCompound
  id: DroneCompoundMedusaLuaTech
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargetsLuaTech
    - !type:HTNCompoundTask
      task: ShuttleAttackDroneCompoundMedusaLuaTech

- type: htnCompound
  id: ShuttleAttackDroneCompoundMedusaLuaTech
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: TargetCoordinates
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        inRangeMaxSpeed: null
        range: 250
        rangeTolerance: 50
        targetKey: TargetCoordinates
        mode: Orbit
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.2
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargetsLuaTech
        key: Target
        coordinatesKey: TargetCoordinates

- type: htnCompound
  id: DroneCompoundMPulsarLuaTech
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargetsLuaTech
    - !type:HTNCompoundTask
      task: ShuttleAttackDroneCompoundMPulsarLuaTech

- type: htnCompound
  id: ShuttleAttackDroneCompoundMPulsarLuaTech
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: TargetCoordinates
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        alwaysFaceTarget: true
        inRangeMaxSpeed: 20
        avoidProjectiles: true
        range: 45
        rangeTolerance: 15
        targetKey: TargetCoordinates
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.7
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargetsLuaTech
        key: Target
        coordinatesKey: TargetCoordinates

