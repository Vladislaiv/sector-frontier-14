- type: entityTable
  id: DamagedAIShipsTable
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
      - id: UnknownShuttleZenith
      #- id: UnknownShuttleRazor # ремапните меня пж
      - id: UnknownShuttleNebula
      - id: UnknownShuttlePerunAI
      - id: UnknownShuttlePozvizdAI
      - id: UnknownShuttleStribogAI
      - id: UnknownShuttleGust
      - id: UnknownShuttleRamDroneSmall
      - id: UnknownShuttleBasicMedium
      - id: UnknownShuttleMPulsar
      - id: UnknownShuttleLance
      - id: UnknownShuttleWasp
      - id: UnknownShuttleCrown
      - id: UnknownShuttlePiercer
      - id: UnknownShuttleMedusa
      - id: UnknownShuttleAssembly

- type: entity
  parent: BaseGameRule
  id: UnknownShuttleAssembly
  components:
  - type: StationEvent
    startAnnouncement: station-event-ai-shuttle-detected
    startAudio:
      path: /Audio/_Lua/Announcements/airogue.ogg
    weight: 2
    maxOccurrences: 6
    minimumPlayers: 40
    requiredJobs:
      Sheriff: 1
    reoccurrenceDelay: 150
    duration: -1
  - type: AiShuttleSpawnRule
    deleteGridsOnEnd: false
    asteroid: false
    groups:
      grid: !type:AiShuttleGridSpawnGroup
        minimumDistance: 1600
        maximumDistance: 3000
        addComponents:
        - type: Company
          companyName: BrokenAi
        - type: RadarBlipIcon
          icon: /Textures/_Lua/Interface/Radar/ai.png
          scale: 1.2
          allowWhenHidden: true
        - type: IFF
          color: "#9a2020"
        - type: GridCleanupGrid
          cleanupAcceleration: 3
          ignorePowered: true
          ignoreIFF: true
          ignorePrice: true
        - type: RandomMetadata
          nameSeparator: ""
          nameSegments:
          - DroneTitle
          - " 0x"
          - DroneHex
          - DroneHex
          - DroneHex
          - DroneHex
          - DroneHex
          - DroneHex
        - type: LinkedLifecycleGridParent
        paths:
        - /Maps/_Mono/Shuttles/World/assembly.yml
    rewardAccounts:
      Nfsd: 0.25
      Frontier: 0.25
      Medical: 0.25
      Edison: 0.25

